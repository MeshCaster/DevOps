name: NuGet Publish (solution)
description: Build, test, pack, and publish a .NET solution to NuGet via trusted publishing (OIDC).

inputs:
  solution-path:
    description: Path to the .sln file
    required: false
    default: "."
  dotnet-version:
    description: .NET SDK version to use
    required: false
    default: "8.0.x"
  configuration:
    description: Build configuration
    required: false
    default: "Release"
  nuget-source:
    description: NuGet source URL
    required: false
    default: "https://api.nuget.org/v3/index.json"
  nuget-user:
    description: nuget.org username (profile name) for trusted publishing
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Restore
      shell: bash
      run: dotnet restore "${{ inputs.solution-path }}"

    - name: Build
      shell: bash
      run: dotnet build "${{ inputs.solution-path }}" -c "${{ inputs.configuration }}" --no-restore

    - name: Test
      shell: bash
      run: dotnet test "${{ inputs.solution-path }}" -c "${{ inputs.configuration }}" --no-build --verbosity normal

    - name: Pack
      shell: bash
      run: dotnet pack "${{ inputs.solution-path }}" -c "${{ inputs.configuration }}" --no-build -o ./nupkgs

    - name: NuGet login (trusted publishing)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ inputs.nuget-user }}

    - name: Publish to NuGet
      shell: bash
      run: >
        dotnet nuget push ./nupkgs/*.nupkg
        --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
        --source "${{ inputs.nuget-source }}"
        --skip-duplicate