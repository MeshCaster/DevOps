name: NuGet Publish (GitHub Packages)
description: Build, test, pack, and publish a .NET solution to a private GitHub Packages feed.

inputs:
  solution-path:
    description: Path to the .sln file (or project)
    required: false
    default: "."
  dotnet-version:
    description: .NET SDK version to use
    required: false
    default: "8.0.x"
  configuration:
    description: Build configuration
    required: false
    default: "Release"
  org:
    description: GitHub org/owner that owns the Packages feed
    required: true
  token:
    description: Token with packages:write (pass secrets.GITHUB_TOKEN)
    required: true
  run-tests:
    description: Whether to run dotnet test
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Restore
      shell: bash
      run: dotnet restore "${{ inputs.solution-path }}"

    - name: Build
      shell: bash
      run: dotnet build "${{ inputs.solution-path }}" -c "${{ inputs.configuration }}" --no-restore

    - name: Test
      if: ${{ inputs.run-tests == 'true' }}
      shell: bash
      run: dotnet test "${{ inputs.solution-path }}" -c "${{ inputs.configuration }}" --no-build --verbosity normal

    - name: Pack
      shell: bash
      run: dotnet pack "${{ inputs.solution-path }}" -c "${{ inputs.configuration }}" --no-build -o ./nupkgs

    - name: Publish to GitHub Packages
      shell: bash
      run: >
        dotnet nuget push ./nupkgs/*.nupkg
        --api-key "${{ inputs.token }}"
        --source "https://nuget.pkg.github.com/${{ inputs.org }}/index.json"
        --skip-duplicate