name: Deploy container to CONTABO

# Reusable workflow: build a Docker image, push it to GitHub Container Registry,
# then SSH into a CONTABO VPS and (re)start the container from the fresh image.
#
# Works for any containerized app. .NET apps get ASPNETCORE_ENVIRONMENT +
# ASPNETCORE_URLS set automatically (aspnetcore: true, the default); for Node
# and other stacks pass aspnetcore: false and set runtime env via extra-env.
#
# .NET example:
#   jobs:
#     deploy:
#       uses: MeshCaster/DevOps/.github/workflows/deploy-container.yml@main
#       with:
#         image-name: app-delivery-api
#         container-name: app-delivery-api
#         host-port: 5000
#         container-port: 80
#         network: meshcaster
#       secrets:
#         host: ${{ secrets.CONTABO_HOST }}
#         username: ${{ secrets.CONTABO_USERNAME }}
#         ssh-private-key: ${{ secrets.CONTABO_SSH_PRIVATE_KEY }}
#
# Node/Next.js example:
#   with:
#     image-name: universal-mep-site
#     container-name: universal-mep-site
#     host-port: 3000
#     container-port: 3000
#     aspnetcore: false
#     extra-env: "-e NODE_ENV=production -e PORT=3000 -e HOSTNAME=0.0.0.0"
#     network: meshcaster
#
# Monorepo building several images: call this workflow once per image and point
# `dockerfile` at each one (the build context stays the repo root).
#   with:
#     image-name: mediathek-api
#     container-name: mediathek-api
#     dockerfile: src/Meshcaster.Mediathek.Api/Dockerfile
#     network: meshcaster

on:
  workflow_call:
    inputs:
      image-name:
        description: GHCR image name (without owner), e.g. app-delivery-api
        type: string
        required: true
      container-name:
        description: Name of the container to run on the host
        type: string
        required: true
      dockerfile:
        description: Path to the Dockerfile, relative to the repo root. Override for monorepos that build several images (e.g. src/My.Api/Dockerfile).
        type: string
        default: Dockerfile
      host-port:
        description: Port published on the host
        type: number
        required: true
      container-port:
        description: Port the app listens on inside the container
        type: number
        default: 80
      aspnetcore:
        description: If true, set ASPNETCORE_ENVIRONMENT + ASPNETCORE_URLS automatically (for .NET apps). Set false for Node/other stacks.
        type: boolean
        default: true
      aspnetcore-environment:
        description: ASPNETCORE_ENVIRONMENT value (only used when aspnetcore is true)
        type: string
        default: "Production"
      volume-args:
        description: 'Extra "docker run" volume flags, single line (e.g. "-v /host:/app/uploads")'
        type: string
        default: ""
      extra-env:
        description: 'Extra "docker run" -e flags, single line (e.g. "-e Foo=Bar -e Baz=Qux")'
        type: string
        default: ""
      env-file:
        description: 'Path on the server to an env file passed to the container (--env-file), for apps with many runtime secrets. Empty = none.'
        type: string
        default: ""
      network:
        description: Docker network to attach the container to (e.g. meshcaster, to reach shared Postgres/Redis/RabbitMQ). Empty = default bridge.
        type: string
        default: ""
      ssh-port:
        description: SSH port on the CONTABO host
        type: number
        default: 22
    secrets:
      host:
        description: CONTABO host / IP (pass secrets.CONTABO_HOST)
        required: true
      username:
        description: SSH username on CONTABO (pass secrets.CONTABO_USERNAME)
        required: true
      ssh-private-key:
        description: SSH private key for CONTABO (pass secrets.CONTABO_SSH_PRIVATE_KEY)
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image ref (GHCR requires lowercase)
        id: img
        run: echo "ref=ghcr.io/${OWNER,,}/${NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}
          NAME: ${{ inputs.image-name }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.img.outputs.ref }}:latest
            ${{ steps.img.outputs.ref }}:${{ github.sha }}

      - name: Deploy to CONTABO
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.host }}
          username: ${{ secrets.username }}
          key: ${{ secrets.ssh-private-key }}
          port: ${{ inputs.ssh-port }}
          script: |
            # Without this, a failing `docker run` is masked by the exit code of
            # the last command in the script and the deploy reports success.
            set -e

            # Login to GitHub Container Registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            docker pull ${{ steps.img.outputs.ref }}:latest

            # Stop and remove old container
            docker stop ${{ inputs.container-name }} || true
            docker rm ${{ inputs.container-name }} || true

            # Run new container
            docker run -d \
              --name ${{ inputs.container-name }} \
              ${{ inputs.network && format('--network {0}', inputs.network) || '' }} \
              -p ${{ inputs.host-port }}:${{ inputs.container-port }} \
              ${{ inputs.volume-args }} \
              ${{ inputs.env-file && format('--env-file {0}', inputs.env-file) || '' }} \
              --restart unless-stopped \
              ${{ inputs.aspnetcore && format('-e ASPNETCORE_ENVIRONMENT={0}', inputs.aspnetcore-environment) || '' }} \
              ${{ inputs.aspnetcore && format('-e ASPNETCORE_URLS=http://+:{0}', inputs.container-port) || '' }} \
              ${{ inputs.extra-env }} \
              ${{ steps.img.outputs.ref }}:latest

            # `docker run -d` exits 0 once the container is *created*, so a container
            # that boots and dies immediately (bad config, missing env) still looks
            # like a success. Confirm it is actually up, and surface logs if not.
            sleep 5
            if [ "$(docker inspect -f '{{.State.Running}}' ${{ inputs.container-name }} 2>/dev/null)" != "true" ]; then
              echo "::error::Container ${{ inputs.container-name }} is not running after deploy"
              docker logs --tail 50 ${{ inputs.container-name }} 2>&1 || true
              exit 1
            fi
            echo "Container ${{ inputs.container-name }} is up."

            # Cleanup old images
            docker image prune -f
