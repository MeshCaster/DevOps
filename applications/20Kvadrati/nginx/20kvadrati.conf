# ---------- Blazor admin : admin.20kvadrati.com -> prod app ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.20kvadrati.com;

    ssl_certificate         /etc/letsencrypt/live/admin.20kvadrati.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/admin.20kvadrati.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/admin.20kvadrati.com/chain.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    client_max_body_size 20M;

    location = / { return 302 /admin; }

    location /admin {
        proxy_pass http://app-delivery-api:80;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    location /_blazor {
        proxy_pass http://app-delivery-api:80;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    location /_framework { proxy_pass http://app-delivery-api:80; include /etc/nginx/snippets/proxy-common.conf; }
    location /css        { proxy_pass http://app-delivery-api:80; include /etc/nginx/snippets/proxy-common.conf; }
    location /js         { proxy_pass http://app-delivery-api:80; include /etc/nginx/snippets/proxy-common.conf; }
}

