    ssl_trusted_certificate /etc/letsencrypt/live/20kvadrati.com/chain.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    client_max_body_size 20M;

    # location / {
    #     proxy_pass http://__FRONTEND_UPSTREAM__;
    #     include /etc/nginx/snippets/proxy-common.conf;
    # }
