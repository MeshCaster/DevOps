# 20kvadrati — drop into <base>/nginx/conf.d/ of the tools/nginx stack.
# Upstreams = container names on the `meshcaster` network:
#   app-delivery-api:80          (prod API + Blazor admin)
#   app-delivery-api-staging:81  (staging API + admin)
#   __FRONTEND_UPSTREAM__        (old :5001 root site / prodadmin — SET THIS)

# ---------- HTTP :80 — ACME + redirect (all domains) ----------
server {
    listen 80;
    listen [::]:80;
    server_name 20kvadrati.com www.20kvadrati.com
                prodapi.20kvadrati.com prodadmin.20kvadrati.com
                admin.20kvadrati.com
                stagingapi.20kvadrati.com stagingadmin.20kvadrati.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ---------- Frontend + static uploads : 20kvadrati.com / www ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name 20kvadrati.com www.20kvadrati.com;

    ssl_certificate         /etc/letsencrypt/live/20kvadrati.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/20kvadrati.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/20kvadrati.com/chain.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    client_max_body_size 20M;

    location /uploads/ {
        alias /var/www/20kvadrati/uploads/;

        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept" always;

        gzip on;
        gzip_vary on;
        gzip_types image/jpeg image/png image/webp application/octet-stream;
        gzip_min_length 1024;
        gzip_comp_level 6;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        try_files $uri =404;
    }

    # location / {
    #     proxy_pass http://__FRONTEND_UPSTREAM__;
    #     include /etc/nginx/snippets/proxy-common.conf;
    # }
}

# ---------- Prod API + SignalR : prodapi.20kvadrati.com ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name prodapi.20kvadrati.com;

    ssl_certificate         /etc/letsencrypt/live/20kvadrati.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/20kvadrati.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/20kvadrati.com/chain.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    client_max_body_size 20M;

    location / {
        proxy_pass http://app-delivery-api:80;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 86400s;
    }
}

# ---------- Prod admin (old :5001) : prodadmin.20kvadrati.com ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name prodadmin.20kvadrati.com;

    ssl_certificate         /etc/letsencrypt/live/20kvadrati.com/fullchain.pem;
