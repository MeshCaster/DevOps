# agents-bitrix — .NET reverse proxy for the tools/nginx stack.
#
# Upstream: container `bitrix-agents:8080` on the `meshcaster` network
# (deployed via .github/workflows/deploy-container.yml). proxy-common.conf
# already carries the websocket upgrade + X-Forwarded-* headers, so this is a
# plain single-upstream proxy.
#
# Domain: bitrix.in-vent.online

# ---------- HTTP :80 — ACME challenge + redirect to HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name bitrix.in-vent.online;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ---------- HTTPS :443 — proxy to the Bitrix app container ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bitrix.in-vent.online;

    ssl_certificate         /etc/letsencrypt/live/bitrix.in-vent.online/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/bitrix.in-vent.online/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/bitrix.in-vent.online/chain.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    client_max_body_size 20M;

    location / {
        proxy_pass http://bitrix-agents:8080;
        include /etc/nginx/snippets/proxy-common.conf;
    }
}
