# MeshCaster.Identity — OAuth / OpenID Connect server for the tools/nginx stack.
#
# One upstream on the `meshcaster` network, deployed via .github/workflows/deploy-container.yml
# from the MeshCaster/Identity repo:
#
#   meshcaster-identity:8080
#
# proxy-common.conf carries the websocket upgrade + X-Forwarded-* headers, so this is a plain
# single-upstream proxy.
#
# Domain:
#   identity.in-vent.online
#
# This host must match OpenIddict:Issuer in the app's appsettings.Production.json exactly. The
# issuer is pinned there and published in the discovery document, so a mismatch makes every client
# reject the tokens it mints.
#
#   tools/nginx/add-app.sh identity.in-vent.online   # then request the cert

# ---------- HTTP :80 — ACME challenge + redirect to HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name identity.in-vent.online;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ---------- HTTPS :443 — identity server ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name identity.in-vent.online;

    ssl_certificate         /etc/letsencrypt/live/identity.in-vent.online/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/identity.in-vent.online/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/identity.in-vent.online/chain.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    # Only tokens and form posts from the login page pass through here.
    client_max_body_size 1M;

    location / {
        proxy_pass http://meshcaster-identity:8080;
        include /etc/nginx/snippets/proxy-common.conf;
    }
}
