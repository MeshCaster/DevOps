# Meshcaster.Mediathek — .NET reverse proxy for the tools/nginx stack.
#
# Two upstreams on the `meshcaster` network, both deployed via
# .github/workflows/deploy-container.yml from the Meshcaster.Mediathek repo:
#
#   mediathek-api:8080     public API consumed by the mobile app
#   mediathek-admin:8080   Razor Pages admin panel
#
# proxy-common.conf already carries the websocket upgrade + X-Forwarded-*
# headers, so these are plain single-upstream proxies.
#
# Domains (adjust to taste, then request certs for both):
#   mediathek.in-vent.online        -> API
#   admin.mediathek.in-vent.online  -> admin panel

# ---------- HTTP :80 — ACME challenge + redirect to HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name mediathek.in-vent.online admin.mediathek.in-vent.online;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ---------- HTTPS :443 — public API ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mediathek.in-vent.online;

    ssl_certificate         /etc/letsencrypt/live/mediathek.in-vent.online/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/mediathek.in-vent.online/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/mediathek.in-vent.online/chain.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    client_max_body_size 20M;

    location / {
        proxy_pass http://mediathek-api:8080;
        include /etc/nginx/snippets/proxy-common.conf;
    }
}

# ---------- HTTPS :443 — admin panel ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.mediathek.in-vent.online;

    ssl_certificate         /etc/letsencrypt/live/admin.mediathek.in-vent.online/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/admin.mediathek.in-vent.online/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/admin.mediathek.in-vent.online/chain.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    client_max_body_size 20M;

    location / {
        proxy_pass http://mediathek-admin:8080;
        include /etc/nginx/snippets/proxy-common.conf;
    }
}
