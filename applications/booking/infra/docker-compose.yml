name: meshcaster-bookings-infra

services:
  postgres:
    image: postgres:16
    env_file: .env
    ports: ["5432:5432"]
    volumes:
      - meshcaster_pg:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports: ["6379:6379"]

  rabbitmq:                              # GameZone-only for now; salon + subscribers later
    image: rabbitmq:3-management
    ports: ["5672:5672", "15672:15672"]

volumes:
  meshcaster_pg:
    name: meshcaster_pg

networks:
  default:
    name: meshcaster                     # the shared external network apps attach to